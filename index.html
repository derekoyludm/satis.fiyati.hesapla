<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sıralı Satış Fiyatı Hesaplama</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:470px;
    background:#fff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.input-group{margin-bottom:18px;}

label{
    display:block;
    margin-bottom:8px;
    font-weight:700;
    font-size:14px;
    color:#3d4f66;
}

.field-container{
    display:flex;
    gap:8px;
    align-items:center;
}

input,select,button{
    width:100%;
    height:46px;
    border:2px solid #bfc6cd;
    border-radius:8px;
    font-size:16px;
    text-align:center;
    background:#fff;
}

input:focus,select:focus{
    outline:none;
    border-color:#57c785;
}

button{
    background:#2ecc71;
    color:#fff;
    font-weight:700;
    cursor:pointer;
    border:none;
    position:relative;
    margin-top:10px;
}

button:hover,
button:focus-visible{
    box-shadow:0 0 0 3px rgba(231,76,60,0.75);
}

button.clicked{
    box-shadow:0 0 0 3px #3498db !important;
}

.clear-btn{
    width:40px;
    height:46px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.clear-btn:hover{background:#2587ca;}

.yellow-bg{background:#fff7a6 !important;}
.pink-bg{background:#ffd6e8 !important;}
.gray-bg{background:#f2f4f7 !important;}

.row{display:flex;gap:10px;}
.row .input-group{flex:1;}

.result{
    display:none;
    margin-top:20px;
    background:#ecfdf5;
    padding:15px;
    border-radius:10px;
}

.highlight{
    float:right;
    font-weight:bold;
}

.box{
    margin-top:12px;
    padding:10px;
    background:#d4efdf;
    border-left:5px solid #2ecc71;
    border-radius:8px;
}

.reset-btn{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    width:26px;
    height:26px;
    border-radius:6px;
    background:#e74c3c;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="input-group">
<label>Birim Fiyat</label>
<div class="field-container">
<input id="brut" type="tel">
<div class="clear-btn" onclick="temizle(event,'brut')">×</div>
</div>
</div>

<div class="input-group">
<label>Miktar</label>
<div class="field-container">
<input id="miktar" type="tel">
<div class="clear-btn" onclick="temizle(event,'miktar')">×</div>
</div>
</div>

<div class="input-group">
<label>2. Miktar</label>
<div class="field-container">
<input id="miktar2" type="tel" class="yellow-bg">
<div class="clear-btn" onclick="temizle(event,'miktar2')">×</div>
</div>
</div>

<!-- İSKONTO ALANLARI (GÜNCELLENDİ) -->
<div class="row">
<div class="input-group">
<label>İsk 1</label>
<div class="field-container">
<input id="isk1" type="tel">
<div class="clear-btn" onclick="temizle(event,'isk1')">×</div>
</div>
</div>

<div class="input-group">
<label>İsk 2</label>
<div class="field-container">
<input id="isk2" type="tel">
<div class="clear-btn" onclick="temizle(event,'isk2')">×</div>
</div>
</div>
</div>

<div class="row">
<div class="input-group">
<label>İsk 3</label>
<div class="field-container">
<input id="isk3" type="tel">
<div class="clear-btn" onclick="temizle(event,'isk3')">×</div>
</div>
</div>

<div class="input-group">
<label>İsk 4</label>
<div class="field-container">
<input id="isk4" type="tel">
<div class="clear-btn" onclick="temizle(event,'isk4')">×</div>
</div>
</div>
</div>

<div class="row">
<div class="input-group">
<label>Kâr %</label>
<select id="kar" class="gray-bg">
<option value="25">25</option>
<option value="30">30</option>
<option value="40">40</option>
<option value="50">50</option>
</select>
</div>

<div class="input-group">
<label>KDV %</label>
<select id="kdv" class="gray-bg">
<option value="20">20</option>
<option value="10">10</option>
<option value="1">1</option>
</select>
</div>
</div>

<div class="row">
<div class="input-group">
<label>Kutu Miktar</label>
<div class="field-container">
<input id="kutuMiktar" type="tel" class="pink-bg">
<div class="clear-btn" onclick="temizle(event,'kutuMiktar')">×</div>
</div>
</div>

<div class="input-group">
<label>Kutu İskonto %</label>
<select id="kutuIskonto" class="pink-bg">
<option value="5">%5</option>
<option value="10">%10</option>
<option value="15">%15</option>
</select>
</div>
</div>

<button id="hesaplaBtn" onclick="hesapla()">
Hesapla
<div class="reset-btn" onclick="sifirla(event)">↺</div>
</button>

<div class="result" id="sonuc">

<p>Birim Fiyat <span id="ham" class="highlight"></span></p>
<p><b>Birim Fiyat İskontolu</b> <span id="net" class="highlight"></span></p>
<p><b>Satış Fiyatı Kârlı</b> <span id="karli" class="highlight"></span></p>
<p><b>Satış Fiyatı KDV DAHİL</b> <span id="satis" class="highlight"></span></p>

<div class="box">
<p>Kutu Miktar <span id="km" class="highlight"></span></p>
<p><b>Kutu Tutarı İskontosuz</b> <span id="ksk" class="highlight"></span></p>
<p>Kutu İskonto % <span id="ki" class="highlight"></span></p>
<p>Kutu İskonto Tutarı <span id="kit" class="highlight"></span></p>
<p><b>Kutu Satış Fiyatı</b> <span id="ksf" class="highlight"></span></p>
</div>

</div>

</div>

<script>

function temizle(e,id){
    e.preventDefault();
    document.getElementById(id).value="";
    setTimeout(()=>document.getElementById(id).focus(),10);
}

function g(id){
    let v=document.getElementById(id).value.trim();
    if(!v) return 0;
    return parseFloat(v.replace(/\./g,"").replace(/,/g,".")) || 0;
}

function hesapla(){

    const btn=document.getElementById("hesaplaBtn");
    btn.classList.add("clicked");

    let brut=g("brut");
    let m1=g("miktar") || 1;
    let m2=g("miktar2") || 1;

    let isk1=g("isk1");
    let isk2=g("isk2");
    let isk3=g("isk3");
    let isk4=g("isk4");

    let kar=parseFloat(document.getElementById("kar").value);
    let kdv=parseFloat(document.getElementById("kdv").value);

    let km=g("kutuMiktar") || 1;
    let ki=parseFloat(document.getElementById("kutuIskonto").value);

    let ham=(brut/m1)/m2;
    let net=ham*(1-isk1/100)*(1-isk2/100)*(1-isk3/100)*(1-isk4/100);
    let karli=net*(1+kar/100);
    let satis=karli*(1+kdv/100);

    let iskontosuzKutu = satis * km;

    document.getElementById("ham").innerText=ham.toFixed(2);
    document.getElementById("net").innerText=net.toFixed(2);
    document.getElementById("karli").innerText=karli.toFixed(2);
    document.getElementById("satis").innerText=satis.toFixed(2);

    document.getElementById("km").innerText=km;
    document.getElementById("ki").innerText=ki+"%";
    document.getElementById("kit").innerText=(iskontosuzKutu*(ki/100)).toFixed(2);
    document.getElementById("ksk").innerText=iskontosuzKutu.toFixed(2);
    document.getElementById("ksf").innerText=(iskontosuzKutu*(1-ki/100)).toFixed(2);

    document.getElementById("sonuc").style.display="block";
}

function sifirla(e){
    e.preventDefault();
    e.stopPropagation();

    document.querySelectorAll("input").forEach(i=>i.value="");
    document.getElementById("sonuc").style.display="none";
    document.getElementById("hesaplaBtn").classList.remove("clicked");
}

const alanlar=document.querySelectorAll("input,select");

alanlar.forEach((a,i)=>{
    a.addEventListener("keydown",e=>{
        if(e.key==="Enter"){
            e.preventDefault();
            let next=alanlar[i+1];
            if(next){
                next.focus();
                if(next.select) next.select();
            }else{
                hesapla();
            }
        }
    });
});

</script>

</body>
</html>
