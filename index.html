<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sıralı Satış Fiyatı Hesaplama</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:470px;
    background:#ffffff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.input-group{
    margin-bottom:18px;
    width:100%;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:700;
    color:#3d4f66;
}

.field-container{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
}

.field-container input[type="text"]{
    width:100%;
    min-width:0;
}

input[type="text"]{
    flex:1;
    height:46px;
    border:2px solid #bfc6cd;
    border-radius:8px;
    background:#fff;
    padding:0 14px;
    font-size:16px;
    text-align:center;
    transition:0.2s;
}

input[type="text"]:focus{
    outline:none;
    border-color:#57c785;
}

.yellow-bg{
    background:#f7eb75 !important;
}

.clear-btn{
    width:40px;
    height:46px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    flex-shrink:0;
}

.clear-btn:hover{
    background:#2587ca;
}

.row{
    display:flex;
    gap:10px;
    width:100%;
}

.row .input-group{
    flex:1;
    min-width:0;
}

select{
    width:100%;
    height:46px;
    border:2px solid #bfc6cd;
    border-radius:8px;
    font-size:16px;
    text-align:center;
    background:white;
}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
    transition:0.2s;
}

button:hover{
    background:#28b765;
}

.result{
    display:none;
    margin-top:20px;
    background:#ecfdf5;
    border-radius:10px;
    padding:15px;
}

.result p{
    margin:10px 0;
    color:#2c3e50;
    font-size:14px;
}

.highlight{
    float:right;
    font-weight:bold;
}

.total-box{
    background:#ebf5fb;
    padding:10px;
    border-radius:8px;
    margin-top:12px;
    border-left:5px solid #3498db;
}

.final-box{
    background:#d4efdf;
    padding:10px;
    border-radius:8px;
    margin-top:12px;
    border-left:5px solid #2ecc71;
}

@media(max-width:480px){

    .row{
        flex-direction:row;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="input-group">

<label>Toplam Brüt Giriş Tutarı (KDV Hariç)</label>

<div class="field-container">
<input type="text" id="brut">
<div class="clear-btn" onclick="temizleKutu('brut')">×</div>
</div>

</div>

<div class="input-group">

<label>Ürün Miktarı (Adet / Adet Sayısı)</label>

<div class="field-container">
<input type="text" id="miktar">
<div class="clear-btn" onclick="temizleKutu('miktar')">×</div>
</div>

</div>

<div class="input-group">

<label>2. Ürün Miktarı (Adet / Adet Sayısı)</label>

<div class="field-container">
<input type="text" id="miktar2" class="yellow-bg">
<div class="clear-btn" onclick="temizleKutu('miktar2')">×</div>
</div>

</div>

<div class="row">

<div class="input-group">

<label>İskonto 1 (%)</label>

<div class="field-container">
<input type="text" id="isk1">
<div class="clear-btn" onclick="temizleKutu('isk1')">×</div>
</div>

</div>

<div class="input-group">

<label>İskonto 2 (%)</label>

<div class="field-container">
<input type="text" id="isk2">
<div class="clear-btn" onclick="temizleKutu('isk2')">×</div>
</div>

</div>

</div>

<div class="row">

<div class="input-group">

<label>İskonto 3 (%)</label>

<div class="field-container">
<input type="text" id="isk3">
<div class="clear-btn" onclick="temizleKutu('isk3')">×</div>
</div>

</div>

<div class="input-group">

<label>İskonto 4 (%)</label>

<div class="field-container">
<input type="text" id="isk4">
<div class="clear-btn" onclick="temizleKutu('isk4')">×</div>
</div>

</div>

</div>

<div class="row">

<div class="input-group">

<label>Kâr Marjı Oranı (%)</label>

<select id="kar">
<option value="10">10</option>
<option value="15">15</option>
<option value="20">20</option>
<option value="25" selected>25</option>
<option value="30">30</option>
<option value="35">35</option>
<option value="50">50</option>
</select>

</div>

<div class="input-group">

<label>KDV Oranı (%)</label>

<select id="kdv">
<option value="1">%1</option>
<option value="10">%10</option>
<option value="20" selected>%20</option>
</select>

</div>

</div>

<button onclick="hesaplaSatis()">
Satış Fiyatını Hesapla
</button>

<div class="result" id="sonucAlani">

<p>
1. Ham Adet Maliyeti
<span class="highlight" id="resHamMaliyet">0,00 TL</span>
</p>

<p>
2. İskontolu Net Adet Maliyeti
<span class="highlight" id="resNetMaliyet">0,00 TL</span>
</p>

<div class="total-box">

<p>
Eklenen Kâr Tutarı
<span class="highlight" id="resKarTutar">0,00 TL</span>
</p>

<p style="font-weight:bold;">
3. Kârlı Adet Fiyatı (KDV Hariç)
<span class="highlight" id="resKarliFiyat">0,00 TL</span>
</p>

</div>

<div class="final-box">

<p>
KDV Tutarı
<span class="highlight" id="resKdvTutar">0,00 TL</span>
</p>

<p style="font-size:16px;font-weight:bold;color:#27ae60;">
4. Ürün Adet Satış Fiyatı (KDV Dahil)
<span class="highlight" id="resAdetSatis">0,00 TL</span>
</p>

</div>

</div>

</div>

<script>

function temizleKutu(id){

    document.getElementById(id).value = "";

}

function guvenliSayiyaCevir(id,tip){

    let value = document.getElementById(id).value.trim();

    if(value === ""){
        return 0;
    }

    if(tip === "tutar"){
        value = value.replace(/\./g,"").replace(",",".");
    }else{
        value = value.replace(",",".");
    }

    let sayi = parseFloat(value);

    return isNaN(sayi) ? 0 : sayi;
}

function hesaplaSatis(){

    let brut = guvenliSayiyaCevir("brut","tutar");

    let miktar1 = guvenliSayiyaCevir("miktar","sayi");
    let miktar2 = guvenliSayiyaCevir("miktar2","sayi");

    let isk1 = guvenliSayiyaCevir("isk1","oran");
    let isk2 = guvenliSayiyaCevir("isk2","oran");
    let isk3 = guvenliSayiyaCevir("isk3","oran");
    let isk4 = guvenliSayiyaCevir("isk4","oran");

    let karOran = parseFloat(document.getElementById("kar").value) || 0;
    let kdvOran = parseFloat(document.getElementById("kdv").value) || 0;

    if(brut <= 0){

        alert("Lütfen geçerli bir tutar giriniz.");
        return;

    }

    if(miktar1 <= 0){
        miktar1 = 1;
    }

    if(miktar2 <= 0){
        miktar2 = 1;
    }

    let hamAdetMaliyeti = (brut / miktar1) / miktar2;

    let netAdetMaliyeti = hamAdetMaliyeti;

    netAdetMaliyeti *= (1 - isk1 / 100);
    netAdetMaliyeti *= (1 - isk2 / 100);
    netAdetMaliyeti *= (1 - isk3 / 100);
    netAdetMaliyeti *= (1 - isk4 / 100);

    let karTutar = netAdetMaliyeti * (karOran / 100);

    let karliFiyat = netAdetMaliyeti + karTutar;

    let kdvTutar = karliFiyat * (kdvOran / 100);

    let satisFiyati = karliFiyat + kdvTutar;

    let fmt = {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    };

    document.getElementById("resHamMaliyet").innerText =
        hamAdetMaliyeti.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resNetMaliyet").innerText =
        netAdetMaliyeti.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resKarTutar").innerText =
        karTutar.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resKarliFiyat").innerText =
        karliFiyat.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resKdvTutar").innerText =
        kdvTutar.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resAdetSatis").innerText =
        satisFiyati.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("sonucAlani").style.display = "block";

}

document.querySelectorAll("input").forEach(function(input){

    input.addEventListener("keydown",function(e){

        if(e.key === "Enter"){

            e.preventDefault();
            hesaplaSatis();

        }

    });

});

</script>

</body>
</html>
