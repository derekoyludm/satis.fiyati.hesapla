<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sıralı Satış Fiyatı Hesaplama</title>

<style>

*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:470px;
    background:#ffffff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.input-group{
    margin-bottom:18px;
    width:100%;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:700;
    color:#3d4f66;
}

.field-container{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
}

/* INPUT + SELECT GENEL */
input, select{
    width:100%;
    height:46px;
    border:2px solid #bfc6cd;
    border-radius:8px;
    font-size:16px;
    text-align:center;
    background:#fff;
}

/* 🔥 AÇIK GRİ (ESKİ TASARIM) */
select{
    background:#f2f2f2;
}

/* RENKLER */
.yellow-bg{background:#fff7a6 !important;}
.pink-bg{background:#ffd6e8 !important;}

/* TEMİZLE */
.clear-btn{
    width:40px;
    height:46px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    flex-shrink:0;
}

/* ROW */
.row{
    display:flex;
    gap:10px;
    width:100%;
    flex-wrap:nowrap;
}

.row .input-group{
    flex:1;
    min-width:0;
}

/* BUTTON */
button{
    width:100%;
    height:50px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    font-size:17px;
    font-weight:700;
    margin-top:10px;
}

.result{
    display:none;
    margin-top:20px;
    background:#ecfdf5;
    border-radius:10px;
    padding:15px;
}

.highlight{
    float:right;
    font-weight:bold;
}

.box{
    background:#d4efdf;
    padding:10px;
    border-radius:8px;
    margin-top:12px;
    border-left:5px solid #2ecc71;
}

</style>
</head>

<body>

<div class="container">

<div class="input-group">
<label>Brüt Tutar</label>
<div class="field-container">
<input type="tel" id="brut">
<div class="clear-btn" onclick="temizle('brut')">×</div>
</div>
</div>

<div class="input-group">
<label>Miktar</label>
<div class="field-container">
<input type="tel" id="miktar">
<div class="clear-btn" onclick="temizle('miktar')">×</div>
</div>
</div>

<div class="input-group">
<label>2. Miktar</label>
<div class="field-container">
<input type="tel" class="yellow-bg" id="miktar2">
<div class="clear-btn" onclick="temizle('miktar2')">×</div>
</div>
</div>

<div class="row">

<div class="input-group">
<label>İsk 1</label>
<div class="field-container">
<input type="tel" id="isk1">
<div class="clear-btn" onclick="temizle('isk1')">×</div>
</div>
</div>

<div class="input-group">
<label>İsk 2</label>
<div class="field-container">
<input type="tel" id="isk2">
<div class="clear-btn" onclick="temizle('isk2')">×</div>
</div>
</div>

</div>

<div class="row">

<div class="input-group">
<label>İsk 3</label>
<div class="field-container">
<input type="tel" id="isk3">
<div class="clear-btn" onclick="temizle('isk3')">×</div>
</div>
</div>

<div class="input-group">
<label>İsk 4</label>
<div class="field-container">
<input type="tel" id="isk4">
<div class="clear-btn" onclick="temizle('isk4')">×</div>
</div>
</div>

</div>

<!-- 🔥 KÂR & KDV AÇIK GRİ -->
<div class="row">

<div class="input-group">
<label>Kâr %</label>
<select id="kar">
<option value="25" selected>25</option>
<option value="30">30</option>
<option value="40">40</option>
</select>
</div>

<div class="input-group">
<label>KDV %</label>
<select id="kdv">
<option value="20" selected>20</option>
<option value="10">10</option>
</select>
</div>

</div>

<div class="row">

<div class="input-group">
<label>Kutu Miktar</label>
<div class="field-container">
<input type="tel" class="pink-bg" id="kutuMiktar">
<div class="clear-btn" onclick="temizle('kutuMiktar')">×</div>
</div>
</div>

<div class="input-group">
<label>Kutu İskonto %</label>
<div class="field-container">
<input type="tel" class="pink-bg" id="kutuIskonto">
<div class="clear-btn" onclick="temizle('kutuIskonto')">×</div>
</div>
</div>

</div>

<button onclick="hesapla()">Hesapla</button>

<div class="result" id="sonuc">

<p>Birim Fiyat <span class="highlight" id="ham"></span></p>
<p><b>Birim Fiyat İskontolu</b> <span class="highlight" id="net"></span></p>
<p><b>Satış Fiyatı</b> <span class="highlight" id="karli"></span></p>
<p><b>Satış Fiyatı KDV DAHİL</b> <span class="highlight" id="satis"></span></p>

<div class="box">
<p>Kutu Miktar <span class="highlight" id="km"></span></p>
<p>Kutu İskonto % <span class="highlight" id="ki"></span></p>
<p>Kutu İskonto Tutar <span class="highlight" id="kit"></span></p>
<p><b>Kutu Satış Fiyatı</b> <span class="highlight" id="ksf"></span></p>
</div>

</div>

</div>

<script>

function temizle(id){
document.getElementById(id).value="";
}

function g(id){
let v=document.getElementById(id).value.trim();
if(!v) return 0;
return parseFloat(v.replace(/\./g,"").replace(",","."))||0;
}

function hesapla(){

let brut=g("brut");
let m1=g("miktar");
let m2=g("miktar2");

let isk1=g("isk1");
let isk2=g("isk2");
let isk3=g("isk3");
let isk4=g("isk4");

let kar=parseFloat(document.getElementById("kar").value);
let kdv=parseFloat(document.getElementById("kdv").value);

let km=g("kutuMiktar");
let ki=g("kutuIskonto");

if(m1<=0)m1=1;
if(m2<=0)m2=1;

let ham=(brut/m1)/m2;
let net=ham*(1-isk1/100)*(1-isk2/100)*(1-isk3/100)*(1-isk4/100);

let karli=net*(1+kar/100);
let satis=karli*(1+kdv/100);

let kutu=satis*km*(1-ki/100);
let kutuIsk=satis*km*(ki/100);

document.getElementById("ham").innerText=ham.toFixed(2);
document.getElementById("net").innerText=net.toFixed(2);
document.getElementById("karli").innerText=karli.toFixed(2);
document.getElementById("satis").innerText=satis.toFixed(2);

document.getElementById("km").innerText=km;
document.getElementById("ki").innerText=ki+"%";
document.getElementById("kit").innerText=kutuIsk.toFixed(2);
document.getElementById("ksf").innerText=kutu.toFixed(2);

document.getElementById("sonuc").style.display="block";

}

</script>

</body>
</html>
