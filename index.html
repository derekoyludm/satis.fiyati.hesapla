<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, user-scalable=no">
<title>Satış Fiyatı Hesaplama</title>

<link class="icon" type="image/png" sizes="512x512" href="tag-512.png">
<link rel="apple-touch-icon" href="tag-512.png">

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

/* Yatayda ortalı, dikeyde üst tarafa (flex-start) hizalı yapı */
body{
    margin:0;
    padding: 30px 20px 20px 20px; 
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    display:flex;
    justify-content:center;
    align-items: flex-start; 
    min-height: 100vh;
}

/* Kutunun genişlik dengesini hem PC hem mobil için koruyan alan */
.container{
    width:100%;
    max-width:440px; 
    background:#fff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    margin: 0 auto; 
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
    font-size:13px;
    color:#6b7a90;
}

/* Kutu Miktar için butonu sağa alan yatay esnek yapı */
.field-container{
    display:flex;
    gap:4px; 
    align-items:center;
}

/* Birim Fiyat, Miktarlar ve İskontolar için butonu alta alan dikey esnek yapı */
.field-container-isk {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
}

/* Kar, KDV ve Kutu İskonto için butonlu esnek satır yapısı */
.stepper-container {
    display: flex;
    align-items: center;
    background: #fff;
    border: 1.5px solid #c9d2dc;
    border-radius: 8px;
    height: 46px;
    overflow: hidden;
    transition: .15s;
    outline: none !important;
}

/* Seçim esnasında Chrome'un dış siyah border basmasını engelleme */
.stepper-container:focus-within {
    border-color: #8fd4ae !important;
    box-shadow: 0 0 0 4px rgba(143,212,174,0.45) !important;
    outline: none !important;
}

input,
select,
button{
    width:100%;
    height:46px;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    font-size:16px; 
    text-align:center;
    background:#fff;
    font-weight:400;
    transition:.15s;
    outline: none !important;
}

/* Kutunun içindeki tarayıcıya ait orijinal tek aşağı oku tamamen gizleyen ayarlar */
.stepper-container select {
    flex: 1;
    border: none !important;
    height: 100%;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    padding: 0;
    text-align-last: center;
    font-size: 16px;
    cursor: pointer;
    box-shadow: none !important;
    background: transparent !important;
    outline: none !important;
}

/* Chrome select focus siyah halka temizliği */
.stepper-container select:focus {
    outline: none !important;
    box-shadow: none !important;
}

/* IE ve Eski Edge için iç okları temizleme */
.stepper-container select::-ms-expand {
    display: none;
}

.step-btn {
    width: 36px;
    height: 100%;
    border: none;
    background: #f1f4f7;
    color: #2c3e50;
    font-size: 18px; 
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    outline: none !important;
}

.step-btn:hover {
    background: #e2e8f0;
}

.step-btn:active {
    background: #cbd5e1;
}

input:focus, 
select:focus {
    font-size: 16px !important;
    outline: none !important;
}

input:focus {
    outline: none !important;
    -webkit-fullscreen-control-style: none;
    border-color: #8fd4ae !important;
    box-shadow: 0 0 0 4px rgba(143,212,174,0.45) !important;
}

.main-btn{
    flex:1;
    background:#fff;
    color:#2c3e50;
    font-weight:600;
    cursor:pointer;
    border:1.5px solid #c9d2dc;
    transition:.15s;
}

.main-btn:hover{
    background:#f6f8fa;
}

.main-btn:focus,
.main-btn:active{
    outline:none;
    border-color:#8fd4ae;
    box-shadow:0 0 0 4px rgba(143,212,174,0.35);
}

button.clicked-blue{
    border-color:#8fd4ae !important;
    box-shadow:0 0 0 4px rgba(143,212,174,0.45) !important;
}

.reset-btn{
    width:46px;
    min-width:46px;
    background:#fff;
    color:#2c3e50;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.15s;
}

.reset-btn:hover{
    background:#f6f8fa;
}

.reset-btn:focus,
.reset-btn:active,
.reset-btn.active-reset{
    outline:none;
    border-color:#e74c3c;
    box-shadow:0 0 0 4px rgba(231,76,60,0.35);
}

/* Kutu Miktar'ın SAĞINDA yer alan buton %5 daraltılarak 24.7px değerine düşürüldü */
.clear-btn-sag {
    width: 24.7px; 
    height: 46px;
    min-width: 24.7px;
    background: #3498db;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    font-size: 14px; 
}

/* Kutuların altında duran ve yüksekliği 26px olan ortak silme butonları */
.clear-btn-isk {
    width: 100%;
    height: 26px;
    min-width: 100%;
    background: #3498db;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
}

.clear-btn-sag:hover, .clear-btn-isk:hover{
    background:#2587ca;
}

.yellow-bg{background:#fff7a6 !important;}
.pink-bg{background:#ffd6e8 !important;}

/* Kâr ve KDV için belirginleştirilmiş orta-koyu yeşil arka plan rengi */
.green-bg{background:#c8ebd6 !important;}

/* Odaklanınca ve seçim esnasında arka plan renk korumaları */
.stepper-container:has(select.green-bg) { background-color: #c8ebd6 !important; }
.stepper-container:has(select.pink-bg) { background-color: #ffd6e8 !important; }

.row{
    display:flex;
    gap:10px;
}

/* Üst sıra için özel flex yapısı */
.row-top{
    display:flex;
    gap:10px;
}

/* Birim Fiyat satırın %50'sini kaplasın */
.w-50 {
    flex: 2;
}

/* Miktar ve 2. Miktar kendi aralarında %25 + %25 kaplasın */
.w-25 {
    flex: 1;
}

/* İskontoların yan yana rahat sığması için 4'lü satıra özel sınıf */
.row-isk{
    display:flex;
    gap:8px;
}

.row .input-group, .row-isk .input-group{
    flex:1;
}

.button-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.result{
    display:none;
    margin-top:20px;
    background:#f7fbf9;
    padding:15px;
    border-radius:10px;
}

.result p{
    margin:8px 0;
    font-size:14px;
    color:#3d4f66;
}

.highlight{
    float:right;
    font-weight:600;
    color:#2c3e50;
}

.label-text {
    font-weight: normal;
    color: #7f8c8d;
    font-size: 12px;
    margin-left: 4px;
}

.box{
    margin-top:12px;
    padding:10px;
    background:#eaf7ef;
    border-left:4px solid #2ecc71;
    border-radius:8px;
}

.box p{
    margin:6px 0;
    font-size:13px;
}

.creator{
    margin-top:22px;
    text-align:center;
    font-size:12px;
    color:#9aa6b2;
    letter-spacing:.4px;
}

</style>
</head>

<body>

<div class="container">

<div class="row-top">

<div class="input-group w-50">
<label>Birim Fiyat</label>
<div class="field-container-isk">
<input id="brut" type="text" inputmode="decimal">
<div class="clear-btn-isk" ontouchstart="temizle(event,'brut')" onclick="temizle(event,'brut')">×</div>
</div>
</div>

<div class="input-group w-25">
<label>Miktar</label>
<div class="field-container-isk">
<input id="miktar" type="text" inputmode="decimal">
<div class="clear-btn-isk" ontouchstart="temizle(event,'miktar')" onclick="temizle(event,'miktar')">×</div>
</div>
</div>

<div class="input-group w-25">
<label>2. Miktar</label>
<div class="field-container-isk">
<input id="miktar2" type="text" inputmode="decimal" class="yellow-bg">
<div class="clear-btn-isk" ontouchstart="temizle(event,'miktar2')" onclick="temizle(event,'miktar2')">×</div>
</div>
</div>

</div>

<div class="row-isk">

<div class="input-group">
<label>İsk 1</label>
<div class="field-container-isk">
<input id="isk1" type="text" inputmode="decimal">
<div class="clear-btn-isk" ontouchstart="temizle(event,'isk1')" onclick="temizle(event,'isk1')">×</div>
</div>
</div>

<div class="input-group">
<label>İsk 2</label>
<div class="field-container-isk">
<input id="isk2" type="text" inputmode="decimal">
<div class="clear-btn-isk" ontouchstart="temizle(event,'isk2')" onclick="temizle(event,'isk2')">×</div>
</div>
</div>

<div class="input-group">
<label>İsk 3</label>
<div class="field-container-isk">
<input id="isk3" type="text" inputmode="decimal">
<div class="clear-btn-isk" ontouchstart="temizle(event,'isk3')" onclick="temizle(event,'isk3')">×</div>
</div>
</div>

<div class="input-group">
<label>İsk 4</label>
<div class="field-container-isk">
<input id="isk4" type="text" inputmode="decimal">
<div class="clear-btn-isk" ontouchstart="temizle(event,'isk4')" onclick="temizle(event,'isk4')">×</div>
</div>
</div>

</div>

<div class="row">

<div class="input-group">
<label>Kâr %</label>
<div class="stepper-container">
    <div class="step-btn" onclick="degistir('kar', -1)">-</div>
    <select id="kar" class="green-bg">
    <option value="5">5</option> <option value="10">10</option> <option value="15">15</option> <option value="20">20</option>
    <option value="25" selected>25</option> <option value="30">30</option> <option value="35">35</option> <option value="40">40</option>
    <option value="45">45</option> <option value="50">50</option> <option value="55">55</option> <option value="60">60</option>
    <option value="65">65</option> <option value="70">70</option> <option value="75">75</option> <option value="80">80</option>
    <option value="85">85</option> <option value="90">90</option> <option value="95">95</option> <option value="100">100</option>
    </select>
    <div class="step-btn" onclick="degistir('kar', 1)">+</div>
</div>
</div>

<div class="input-group">
<label>KDV %</label>
<div class="stepper-container">
    <div class="step-btn" onclick="degistir('kdv', -1)">-</div>
    <select id="kdv" class="green-bg">
    <option value="1" selected>1</option>
    <option value="10">10</option>
    <option value="20">20</option>
    </select>
    <div class="step-btn" onclick="degistir('kdv', 1)">+</div>
</div>
</div>

</div>

<div class="row">

<div class="input-group">
<label>Kutu Miktar</label>
<div class="field-container">
<input id="kutuMiktar" type="text" inputmode="decimal" class="pink-bg">
<div class="clear-btn-sag" ontouchstart="temizle(event,'kutuMiktar')" onclick="temizle(event,'kutuMiktar')">×</div>
</div>
</div>

<div class="input-group">
<label>Kutu İskonto %</label>
<div class="stepper-container">
    <div class="step-btn" onclick="degistir('kutuIskonto', -1)">-</div>
    <select id="kutuIskonto" class="pink-bg">
    <option value="5">%5</option>
    <option value="10">%10</option>
    <option value="15">%15</option>
    </select>
    <div class="step-btn" onclick="degistir('kutuIskonto', 1)">+</div>
</div>
</div>

</div>

<div class="button-row">

<button id="hesaplaBtn" class="main-btn" onclick="hesapla()">
Hesapla
</button>

<button class="reset-btn" onclick="sifirla(event)">
↺
</button>

</div>

<div class="result" id="sonuc">

<p>Birim Fiyat <span id="ham" class="highlight"></span></p>
<p><b>Birim Fiyat İskontolu</b> <span id="txtIsk" class="label-text"></span> <span id="net" class="highlight"></span></p>
<p><b>Satış Fiyatı Kârlı</b> <span id="txtKar" class="label-text"></span> <span id="karli" class="highlight"></span></p>
<p style="color:#c0392b;"><b>Satış Fiyatı KDV DAHİL</b> <span id="txtSatisKdv" class="label-text" style="color:#c0392b;"></span> <span id="satis" class="highlight" style="color:#c0392b;"></span></p>
<p>Alış Fiyatı KDV DAHİL <span id="txtAlisKdv" class="label-text"></span> <span id="alisKdvDahil" class="highlight"></span></p>

<div class="box">
<p>Kutu Miktar <span id="km" class="highlight"></span></p>
<p><b>Kutu Tutarı İskontosuz</b> <span id="ksk" class="highlight"></span></p>
<p><b>Kutu İskonto Tutarı</b> <span id="txtKutuIsk" class="label-text"></span> <span id="kit" class="highlight"></span></p>
<p style="color:#3498db;"><b>Kutu Satış Fiyatı</b> <span id="ksf" class="highlight" style="color:#3498db;"></span></p>
</div>
</div>

<div class="creator">
    Created by Fatih Mersin
</div>

</div>

<script>

// Sayfa yüklenir yüklenmez ilk odağı Birim Fiyat alanına verir
window.addEventListener("DOMContentLoaded", () => {
    const ilkAlan = document.getElementById("brut");
    if(ilkAlan) {
        ilkAlan.focus();
    }
});

// Seçim listelerini butonla değiştiren ve başa dönmeyi engelleyen fonksiyon
function degistir(id, yon) {
    let s = document.getElementById(id);
    let yeniIndex = s.selectedIndex + yon;
    
    if (yeniIndex < 0) {
        yeniIndex = 0;
    } else if (yeniIndex >= s.options.length) {
        yeniIndex = s.options.length - 1;
    }
    
    s.selectedIndex = yeniIndex;
    s.dispatchEvent(new Event('change'));
}

// Miktar kutusuna yazılanı anlık olarak Kutu Miktar kutusuna kopyalar
document.getElementById("miktar").addEventListener("input", function() {
    document.getElementById("kutuMiktar").value = this.value;
});

function temizle(e,id){
    e.preventDefault();
    e.stopPropagation();
    
    let el = document.getElementById(id);
    el.value = ""; 
    hesapGecersizYap(); 
    
    if (id === "miktar") {
        document.getElementById("kutuMiktar").value = "";
    }
    
    el.focus();
    
    setTimeout(() => {
        el.focus();
        if(typeof el.setSelectionRange === "function") {
            el.setSelectionRange(0, 0); 
        }
    }, 10);
}

function g(id){
    let v=document.getElementById(id).value.trim();
    if(!v) return 0;
    return parseFloat(v.replace(/\./g,"").replace(/,/g,".")) || 0;
}

function alanBosMu(id){
    return document.getElementById(id).value.trim() === "";
}

function hesapla(){
    let btn=document.getElementById("hesaplaBtn");
    btn.classList.add("clicked-blue");

    let brut=g("brut");
    let m1=g("miktar") || 1;
    let m2=g("miktar2") || 1;

    let isk1=g("isk1");
    let isk2=g("isk2");
    let isk3=g("isk3");
    let isk4=g("isk4");

    let kar=parseFloat(document.getElementById("kar").value);
    let kdv=parseFloat(document.getElementById("kdv").value);

    let km=g("kutuMiktar") || 1;
    let ki=parseFloat(document.getElementById("kutuIskonto").value);

    let ham=(brut/m1)/m2;

    let net=
        ham*
        (1-isk1/100)*
        (1-isk2/100)*
        (1-isk3/100)*
        (1-isk4/100);

    let toplamIskontoYuzdesi = ham > 0 ? ((ham - net) / ham) * 100 : 0;

    let karli=net*(1+kar/100);
    let satis=karli*(1+kdv/100);
    let alisKdvDahil = net * (1 + kdv / 100);

    let iskontosuzKutu=satis*km;

    document.getElementById("txtIsk").innerText = toplamIskontoYuzdesi > 0 ? "(%" + toplamIskontoYuzdesi.toFixed(1) + ")" : "";
    document.getElementById("txtKar").innerText = "(%" + kar + ")";
    document.getElementById("txtSatisKdv").innerText = "(%" + kdv + ")";
    document.getElementById("txtAlisKdv").innerText = "(%" + kdv + ")";
    document.getElementById("txtKutuIsk").innerText = "(%" + ki + ")";

    function formatTR(deger) {
        return deger.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    document.getElementById("ham").innerText=formatTR(ham);
    document.getElementById("net").innerText=formatTR(net);
    document.getElementById("karli").innerText=formatTR(karli);
    document.getElementById("satis").innerText=formatTR(satis);
    document.getElementById("alisKdvDahil").innerText=formatTR(alisKdvDahil);

    if(alanBosMu("miktar") && alanBosMu("kutuMiktar")) {
        document.getElementById("km").innerText="";
    } else {
        document.getElementById("km").innerText=g("kutuMiktar"); 
    }
    
    document.getElementById("kit").innerText=formatTR(iskontosuzKutu*(ki/100));
    document.getElementById("ksk").innerText=formatTR(iskontosuzKutu);
    document.getElementById("ksf").innerText=formatTR(iskontosuzKutu*(1-ki/100));

    document.getElementById("sonuc").style.display="block";
}

function hesapGecersizYap(){
    document.getElementById("sonuc").style.display="none";
    document.getElementById("hesaplaBtn").classList.remove("clicked-blue");
}

document.querySelectorAll("input, select")
.forEach(el=>{

    el.addEventListener("input", ()=>{
        hesapGecersizYap();
        document.querySelector(".reset-btn").classList.remove("active-reset");
    });

    el.addEventListener("change", ()=>{
        hesapGecersizYap();
        document.querySelector(".reset-btn").classList.remove("active-reset");
    });
    
    if(el.tagName === "INPUT") {
        el.addEventListener("focus", () => {
            setTimeout(() => { el.select(); }, 50);
        });
    }

});

const alanlar = Array.from(document.querySelectorAll("input,select"));

// Tüm sayfa düzeyinde ESC tuşunu dinleyen global yakalayıcı
window.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        if (document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "SELECT") {
            e.preventDefault();
            let sonAlan = alanlar[alanlar.length - 1];
            if (sonAlan) {
                sonAlan.focus();
                if (sonAlan.tagName === "INPUT") sonAlan.select();
            }
        }
    }
});

alanlar.forEach((el,i)=>{
    el.addEventListener("keydown",(e)=>{
        
        // 🟢 Yeni: Kar % ve Kutu İskonto % için özel sayısal tuş basım kuralları
        if(el.tagName === "SELECT") {
            // Klavyedeki + ve - tuşları kuralı
            if(e.key === "+" || e.key === "Add") {
                e.preventDefault();
                degistir(el.id, 1);
                return;
            }
            if(e.key === "-" || e.key === "Subtract") {
                e.preventDefault();
                degistir(el.id, -1);
                return;
            }

            // Kar % Kutusunda '2' tuşuna basınca 20 ve 25 arası geçiş
            if(el.id === "kar" && (e.key === "2")) {
                e.preventDefault();
                if(el.value === "20") {
                    el.value = "25";
                } else {
                    el.value = "20";
                }
                el.dispatchEvent(new Event('change'));
                return;
            }

            // Kutu İskonto % Kutusunda tuş geçiş kuralları
            if(el.id === "kutuIskonto") {
                if(e.key === "1") { // '1' tuşuna ardı ardına basınca %10 ve %15 arası geçiş
                    e.preventDefault();
                    if(el.value === "10") {
                        el.value = "15";
                    } else {
                        el.value = "10";
                    }
                    el.dispatchEvent(new Event('change'));
                    return;
                }
                if(e.key === "5") { // '5' tuşuna basınca direkt %5 seçilmesi
                    e.preventDefault();
                    el.value = "5";
                    el.dispatchEvent(new Event('change'));
                    return;
                }
            }
        }

        // ENTER ile İLERI gitme kuralı
        if(e.key==="Enter"){
            e.preventDefault();
            document.activeElement.blur();

            let next=alanlar[i+1];
            if(next){
                setTimeout(()=>{
                    next.focus();
                    if(next.tagName==="INPUT") next.select();
                },0);
            }else{
                hesapla();
            }
        }
        
        // ESC ile GERI gelme kuralı
        if(e.key==="Escape"){
            e.preventDefault();
            
            if(i === 0) {
                return; 
            }

            document.activeElement.blur();
            let prev=alanlar[i-1];
            if(prev){
                setTimeout(()=>{
                    prev.focus();
                    if(prev.tagName==="INPUT") prev.select();
                },0);
            }
        }
    });
});

function sifirla(e){
    e.preventDefault();

    document.querySelectorAll("input").forEach(i=>i.value="");
    
    document.getElementById("kar").value = "25";
    document.getElementById("kdv").value = "1";
    document.getElementById("kutuIskonto").selectedIndex = 0;

    document.getElementById("sonuc").style.display="none";
    document.getElementById("hesaplaBtn").classList.remove("clicked-blue");

    let resetBtn = e.currentTarget;
    resetBtn.classList.add("active-reset");
}

</script>

</body>
</html>
